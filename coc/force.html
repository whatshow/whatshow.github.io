    <nav class="navbar navbar-inverse navbar-fixed-top">
        <div class="container-fluid">
            <div class="navbar-header">
                <a class="navbar-brand" href="#">最强王者联盟——捐兵规定</a>
            </div>
        </div>
    </nav>
    <div class="Content">
        <div class="Title">捐兵规定</div>
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title">一、捐兵兵种</h3>
            </div>
            <div class="panel-body">
                默认弓箭、法师、亡灵（禁止捐巨人、哥布林、炸弹、野蛮人，除非对方写明收该兵种，如果对方写随意之类表示对方不收禁捐兵种）；捐的兵一起起捐，不写等级限制则视为对方接受一级
            </div>
            <div class="panel-footer bg-danger text-danger">乱捐后果：被踢</div>
        </div>
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title">二、捐收比</h3>
            </div>
            <div class="panel-body">
                1:3，每捐1个兵可以收3个兵（你的捐收比要大于等于1:3）<br>
                捐收比0:0，在数学上视为无穷解，不满足1:3的的规定，依旧会被踢<br>
            </div>
            <div class="panel-footer bg-danger text-danger">捐收比不合格后果：禁止参加部落战，每周不定期踢掉捐收比不合格的成员</div>
        </div>
